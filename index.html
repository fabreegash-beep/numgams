<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>✨ MYSTIC GUESSER | Duel Magique ✨</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(ellipse at 30% 40%, #1a0b2e 0%, #0a0515 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            font-family: 'Poppins', 'Segoe UI', system-ui, sans-serif;
            position: relative;
            overflow-x: hidden;
        }

        /* Particules magiques */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 40%, rgba(255, 215, 0, 0.08) 0%, transparent 50%),
                        radial-gradient(circle at 80% 70%, rgba(212, 0, 255, 0.08) 0%, transparent 50%);
            pointer-events: none;
        }

        .game-container {
            max-width: 1300px;
            width: 100%;
            background: rgba(20, 8, 35, 0.75);
            backdrop-filter: blur(16px);
            border-radius: 56px;
            padding: 28px;
            border: 1px solid rgba(255, 215, 0, 0.4);
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.6), inset 0 1px 2px rgba(255, 215, 0, 0.2);
            position: relative;
            z-index: 2;
        }

        .lang-header {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-bottom: 20px;
        }
        .lang-btn {
            background: rgba(30, 15, 50, 0.8);
            border: 1px solid #d4af37;
            padding: 6px 18px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.85rem;
            transition: 0.2s;
            color: #e9c9ff;
        }
        .lang-btn.active {
            background: linear-gradient(135deg, #d4af37, #b8860b);
            color: #1a0b2e;
            border-color: #ffd966;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.6);
        }

        h1 {
            text-align: center;
            font-size: 2.3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #d4af37, #c084fc, #ff66cc);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 15px;
            letter-spacing: -0.5px;
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
        }

        .range-panel {
            background: rgba(30, 15, 50, 0.7);
            border-radius: 80px;
            padding: 10px 20px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            border: 1px solid rgba(212, 175, 55, 0.5);
        }

        .range-option {
            background: #241a35;
            border: none;
            padding: 10px 28px;
            border-radius: 60px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
            color: #cbb8ff;
            font-family: monospace;
        }
        .range-option.active {
            background: linear-gradient(95deg, #d4af37, #b8860b);
            color: #1a0b2e;
            box-shadow: 0 0 18px rgba(212, 175, 55, 0.7);
        }

        .room-header {
            background: rgba(20, 8, 40, 0.8);
            border-radius: 40px;
            padding: 14px 22px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            border-bottom: 2px solid #d4af37;
        }
        .room-code-glow {
            font-size: 1.9rem;
            font-family: 'Fira Mono', monospace;
            font-weight: bold;
            background: #0f0720;
            padding: 5px 24px;
            border-radius: 50px;
            color: #ffd966;
            letter-spacing: 5px;
            border: 1px solid #d4af37;
            text-shadow: 0 0 5px #d4af37;
        }

        button {
            background: linear-gradient(105deg, #2a1a45, #1a0f30);
            border: 1px solid rgba(212, 175, 55, 0.6);
            color: #f0e6ff;
            padding: 10px 24px;
            border-radius: 44px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        button:hover:not(:disabled) {
            transform: translateY(-2px);
            border-color: #ff66cc;
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.4);
            background: linear-gradient(105deg, #3a255a, #2a1a45);
        }
        .btn-primary { background: linear-gradient(105deg, #d4af37, #b8860b); border-color: #ffd966; color: #1a0b2e; font-weight: bold; }
        .btn-danger { background: linear-gradient(105deg, #8b3a5a, #5a2a40); border-color: #ff66cc; }
        .btn-warning { background: linear-gradient(105deg, #b86f2a, #8b4a1a); border-color: #ffaa33; }

        .arena {
            display: flex;
            gap: 28px;
            margin: 30px 0;
        }
        .fighter-card {
            flex: 1;
            background: rgba(15, 5, 30, 0.75);
            backdrop-filter: blur(12px);
            border-radius: 44px;
            padding: 24px 16px;
            text-align: center;
            border: 1px solid rgba(212, 175, 55, 0.4);
            transition: 0.2s;
        }
        .fighter-card.active-turn {
            border: 2px solid #ff66cc;
            box-shadow: 0 0 25px rgba(255, 102, 204, 0.5);
            background: rgba(45, 25, 65, 0.9);
        }
        .fighter-card.winner-card {
            border: 2px solid #d4af37;
            box-shadow: 0 0 35px rgba(212, 175, 55, 0.7);
            animation: pulseWin 0.6s ease;
        }
        @keyframes pulseWin {
            0% { transform: scale(1);}
            50% { transform: scale(1.02); background: rgba(212, 175, 55, 0.2);}
        }
        .player-title { font-size: 1.4rem; font-weight: 800; background: linear-gradient(120deg, #ff99cc, #d4af37); -webkit-background-clip: text; background-clip: text; color: transparent; margin-bottom: 12px; }
        .secret-badge { background: #0a0520; border-radius: 32px; padding: 12px; margin: 12px 0; font-family: monospace; font-size: 1.2rem; font-weight: bold; color: #ffd966; border: 1px dashed #d4af37; }
        .turn-indicator { display: inline-block; background: linear-gradient(95deg, #ff66cc, #cc44aa); color: #fff0ff; padding: 4px 16px; border-radius: 40px; font-weight: bold; font-size: 0.7rem; margin-top: 10px; box-shadow: 0 0 8px #ff66cc; }

        .chat-log {
            background: rgba(10, 3, 20, 0.6);
            border-radius: 32px;
            padding: 20px;
            height: 320px;
            overflow-y: auto;
            margin: 20px 0;
            border: 1px solid rgba(212, 175, 55, 0.35);
        }
        .message-bubble {
            margin: 10px 0;
            padding: 10px 18px;
            border-radius: 28px;
            max-width: 80%;
            animation: fadeSlide 0.2s;
        }
        @keyframes fadeSlide { from { opacity:0; transform:translateY(6px);} to{opacity:1;} }
        .my-bubble { background: linear-gradient(125deg, #9b4d96, #6a2e6a); margin-left: auto; text-align: right; color: #fff0ff; border-right: 3px solid #d4af37; }
        .opponent-bubble { background: #2a1a40; margin-right: auto; color: #e9d5ff; border-left: 3px solid #ff99cc; }
        .system-bubble { background: linear-gradient(95deg, #d4af37, #b8860b); color: #1a0b2e; text-align: center; margin: 10px auto; max-width: 90%; font-weight: bold; }

        .guess-area { display: flex; gap: 16px; margin: 16px 0; }
        .guess-area input { flex: 1; background: #0f0722; border: 2px solid #6a4e9e; border-radius: 60px; padding: 14px 20px; font-size: 1rem; color: #ffd966; text-align: center; outline: none; font-weight: bold; }
        .guess-area input:focus { border-color: #ff66cc; box-shadow: 0 0 12px #ff66cc; }

        .waiting-room { text-align: center; padding: 40px 20px; }
        .loader-neon { width: 48px; height: 48px; border: 3px solid rgba(212, 175, 55, 0.3); border-top: 3px solid #d4af37; border-radius: 50%; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .menu-buttons { display: flex; flex-direction: column; gap: 20px; margin: 25px 0; }
        .big-btn { font-size: 1.2rem; padding: 16px 28px; font-weight: 800; }

        @media (max-width: 780px) { .arena { flex-direction: column; } .room-code-glow { font-size: 1.2rem; letter-spacing: 2px; } }
    </style>
</head>
<body>

<script>
    // Firebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyBjHyON3NjKz2yBxCqwgLftd2trh03HYQc",
        authDomain: "arabic-game-onlin.firebaseapp.com",
        databaseURL: "https://arabic-game-onlin-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "arabic-game-onlin",
        storageBucket: "arabic-game-onlin.firebasestorage.app",
        messagingSenderId: "406939044821",
        appId: "1:406939044821:web:3fe9a371862a4ca23f8b5c"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // ========== TRADUCTIONS ==========
    let lang = 'fr';
    const texts = {
        fr: {
            title: "✨ MYSTIC GUESSER ✨",
            rangeLabel: "🌀 ZONE MYSTIQUE",
            btn100: "🔮 1 → 100",
            btn200: "⚜️ 1 → 200",
            btn300: "✨ 1 → 300",
            createRoom: "🌟 CRÉER UN DUEL 🌟",
            joinRoom: "🔮 REJOINDRE L'ARÈNE 🔮",
            rulesTitle: "📜 LOIS MYSTIQUES 📜",
            rule1: "🔹 Chaque joueur reçoit un nombre secret sacré.",
            rule2: "🔹 L'HÔTE lance le rituel en premier, indices : + grand / + petit.",
            rule3: "🔹 Découvre le nombre adverse → victoire et châtiment magique !",
            rule4: "🔹 Revanche infinie, gloire éternelle.",
            copy: "📀 COPY",
            quit: "💀 QUITTER",
            waiting: "🔮 ATTENTE DE L'ADVERSAIRE...",
            shareCode: "Partage le code mystique pour commencer",
            yourTurn: "✨ TURN ACTIF ✨",
            waitingTurn: "🌀 Attente du rituel adverse...",
            guessPlaceholder: "🔮 Entre ton nombre (1-{max})",
            shoot: "⚡ DEVINER ⚡",
            victory: "🏆 VICTOIRE MYSTIQUE 🏆",
            defeat: "💀 DÉFAITE HONORABLE 💀",
            punishment: "🎭 CHÂTIMENT SACRÉ",
            suffer: "😭 SUBIR LE CHÂTIMENT",
            rematch: "🔄 REVANCHE MYSTIQUE",
            host: "⚜️ HÔTE",
            guest: "🌀 INVITÉ",
            youHost: "⚜️ HÔTE (VOUS)",
            youGuest: "🌀 INVITÉ (VOUS)",
            secretCode: "🔐 NOMBRE SACRÉ : ",
            roomCode: "CODE MYSTIQUE",
            toastRange: "🌀 Zone mystique : 1 - {val}",
            toastCopied: "✅ Code copié !",
            toastWrong: "❌ Salle inconnue",
            toastFull: "Salle pleine !",
            toastConnected: "✅ Connecté au duel",
            toastNotTurn: "⛔ Pas ton tour !",
            toastInvalid: "Entre un nombre valide !",
            toastVictory: "🏆 VICTOIRE ! Le nombre était {num}",
            newRoundMsg: "🔄 Nouveau round mystique ! 1 - {range}",
            perfectHit: "💎 RÉVÉLATION ! Le nombre sacré était {num} 💎",
            tooHigh: "📉 TROP ÉLEVÉ ! Cible plus petite que {guess}",
            tooLow: "📈 TROP BAS ! Cible plus grande que {guess}",
            winSystem: "🏆✨ {player} REMPORTE LE DUEL ! Nombre: {num} ✨🏆"
        },
        ar: {
            title: "✨ ميستيك قيسر ✨",
            rangeLabel: "🌀 المنطقة الصوفية",
            btn100: "🔮 1 → 100",
            btn200: "⚜️ 1 → 200",
            btn300: "✨ 1 → 300",
            createRoom: "🌟 إنشاء مبارزة 🌟",
            joinRoom: "🔮 انضم إلى الساحة 🔮",
            rulesTitle: "📜 القوانين الصوفية 📜",
            rule1: "🔹 كل لاعب يحصل على رقم سري مقدس.",
            rule2: "🔹 المضيف يبدأ الطقوس أولاً، التلميحات: أكبر / أصغر.",
            rule3: "🔹 من يكتشف الرقم يفوز ويختار عقوبة سحرية!",
            rule4: "🔹 مباريات لا نهائية، مجد أبدي.",
            copy: "📀 نسخ",
            quit: "💀 مغادرة",
            waiting: "🔮 انتظار الخصم...",
            shareCode: "شارك الرمز الصوفي لبدء المبارزة",
            yourTurn: "✨ دورك الآن ✨",
            waitingTurn: "🌀 انتظر دور الخصم",
            guessPlaceholder: "🔮 أدخل تخمينك (١-{max})",
            shoot: "⚡ خمن ⚡",
            victory: "🏆 فوز صوفي 🏆",
            defeat: "💀 خسارة شريفة 💀",
            punishment: "🎭 عقوبة مقدسة",
            suffer: "😭 تنفيذ العقوبة",
            rematch: "🔄 مبارزة جديدة",
            host: "⚜️ المضيف",
            guest: "🌀 الضيف",
            youHost: "⚜️ المضيف (أنت)",
            youGuest: "🌀 الضيف (أنت)",
            secretCode: "🔐 رقمك السري : ",
            roomCode: "الرمز الصوفي",
            toastRange: "🌀 المنطقة الصوفية : ١ - {val}",
            toastCopied: "✅ تم نسخ الرمز!",
            toastWrong: "❌ الغرفة غير موجودة",
            toastFull: "الغرفة ممتلئة!",
            toastConnected: "✅ تم الانضمام",
            toastNotTurn: "⛔ ليس دورك!",
            toastInvalid: "أدخل رقماً صحيحاً!",
            toastVictory: "🏆 فزت! الرقم كان {num}",
            newRoundMsg: "🔄 جولة صوفية جديدة! النطاق ١ - {range}",
            perfectHit: "💎 كشف! الرقم السري كان {num} 💎",
            tooHigh: "📉 الرقم أصغر من {guess}",
            tooLow: "📈 الرقم أكبر من {guess}",
            winSystem: "🏆✨ {player} انتصر! الرقم السري: {num} ✨🏆"
        }
    };

    function t(key, vars = {}) {
        let str = texts[lang][key] || key;
        Object.keys(vars).forEach(k => { str = str.replace(`{${k}}`, vars[k]); });
        return str;
    }

    function updateUILang() {
        document.getElementById('mainTitle').innerText = t('title');
        if (currentRoomId) database.ref('rooms/'+currentRoomId).once('value', snap => { if(snap.val()) renderGameUI(snap.val()); });
        else showMainInterface();
    }

    // Punishments avec thème mystique
    const punishmentsFr = ["🔮 Imite un sorcier 30s", "✨ Lance un sort imaginaire", "🕯️ Raconte une prophétie absurde", "🎭 Joue un personnage mythique", "📿 Fais 3 vœux à voix haute", "🌀 Tourne sur toi-même 3x", "🔮 Prédit le score du match", "✨ Danse comme une fée", "🕯️ Dis 'Abracadabra' 5 fois", "🎭 Imite un dragon"];
    const punishmentsAr = ["🔮 قلد ساحر ٣٠ ث", "✨ ألق تعويذة وهمية", "🕯️ اختر نبوءة مضحكة", "🎭 مثل شخصية أسطورية", "📿 تمنّ أمنيات ٣ بصوت عال", "🌀 لف حول نفسك ٣ مرات", "🔮 توقع نتيجة مباراة", "✨ ارقص كالجنية", "🕯️ قل 'أبراكادابرا' ٥ مرات", "🎭 قلد تنيناً"];
    function getRandomPunishment() { const arr = lang === 'fr' ? punishmentsFr : punishmentsAr; return arr[Math.floor(Math.random() * arr.length)]; }
    
    function showPunishmentModal(punishment, isWinner) {
        const modal = document.createElement('div');
        modal.style.cssText = "position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(10,3,25,0.96); backdrop-filter:blur(12px); z-index:10000; display:flex; align-items:center; justify-content:center;";
        modal.innerHTML = `<div style="background:linear-gradient(145deg,#1f1235,#0f0720); border:2px solid #d4af37; border-radius:48px; padding:32px; max-width:400px; text-align:center; box-shadow:0 0 60px rgba(212,175,55,0.3);"><div style="font-size:3rem;">${isWinner ? '🏆🔮' : '💀🌀'}</div><h2 style="color:#ffd966;">${isWinner ? (lang==='fr'?'🔮 CHÂTIMENT SACRÉ':'🔮 العقوبة المقدسة') : (lang==='fr'?'EXÉCUTION MYSTIQUE':'تنفيذ العقوبة')}</h2><div style="background:#0a0520; padding:20px; border-radius:32px; margin:20px 0; font-size:1.2rem; color:#ffcc88;">${punishment}</div><button onclick="this.closest('.punish-modal').remove()" style="background:#d4af37; color:#1a0b2e; padding:12px 28px; border-radius:60px; font-weight:bold; border:none;">${isWinner ? (lang==='fr'?'📋 Copier':'📋 نسخ') : (lang==='fr'?'✅ Exécuté':'✅ تم التنفيذ')}</button>${isWinner ? `<button onclick="changePunishModal(this)" style="background:#ff66cc; margin-right:12px; color:#fff;">🎲 ${lang==='fr'?'AUTRE':'آخر'}</button>` : ''}</div>`;
        modal.classList.add('punish-modal');
        document.body.appendChild(modal);
    }
    function changePunishModal(btn) { const modal = btn.closest('.punish-modal'); modal.querySelector('div[style*="background:#0a0520"]').innerHTML = getRandomPunishment(); }
    window.showPunishmentModal = showPunishmentModal;

    let currentRoomId = null, currentPlayer = null, roomListener = null;
    let selectedRange = 100;

    function getRandomNum(range) { return Math.floor(Math.random() * range) + 1; }
    function toast(msg, isErr = false) {
        const div = document.createElement('div');
        div.innerText = msg;
        div.style.cssText = `position:fixed; bottom:25px; left:50%; transform:translateX(-50%); background:${isErr ? '#8b3a5a' : '#d4af37'}; color:${isErr ? '#fff0ff' : '#1a0b2e'}; padding:10px 24px; border-radius:50px; z-index:9999; font-weight:bold; backdrop-filter:blur(12px); font-family:monospace;`;
        document.body.appendChild(div);
        setTimeout(() => div.remove(), 2700);
    }

    function createRoom() {
        const roomId = Math.random().toString(36).substring(2, 8).toUpperCase();
        currentRoomId = roomId; currentPlayer = 'host';
        const hostSecret = getRandomNum(selectedRange);
        const guestSecret = getRandomNum(selectedRange);
        const roomData = { host: { joined: true, secretNumber: hostSecret }, guest: { joined: false, secretNumber: guestSecret }, turn: 'host', phase: 'waiting', gameEnded: false, winner: null, messages: [], currentGuess: null, range: selectedRange };
        database.ref('rooms/'+roomId).set(roomData).then(() => { listenRoom(roomId); renderWaitRoom(); }).catch(() => toast("Erreur", true));
    }
    function joinRoom() {
        const code = prompt(lang === 'fr' ? "🔮 CODE MYSTIQUE :" : "🔮 الرمز الصوفي :", "").toUpperCase();
        if(!code) return;
        database.ref('rooms/'+code).once('value', snap => {
            const room = snap.val();
            if(!room) { toast(t('toastWrong'), true); return; }
            if(room.guest.joined) { toast(t('toastFull'), true); return; }
            currentRoomId = code; currentPlayer = 'guest';
            const newSecret = getRandomNum(room.range || 100);
            database.ref('rooms/'+code).update({ 'guest/joined': true, 'guest/secretNumber': newSecret, phase: 'playing', turn: 'host' }).then(() => { listenRoom(code); toast(t('toastConnected')); });
        });
    }
    function listenRoom(rid) { if(roomListener) roomListener.off(); roomListener = database.ref('rooms/'+rid); roomListener.on('value', snap => { const room = snap.val(); if(!room) showMainInterface(); else renderGameUI(room); }); }
    function renderWaitRoom() {
        document.getElementById('mainContent').innerHTML = `<div class="room-header"><div class="room-code-glow">${currentRoomId}</div><button onclick="copyCodeAct()" class="btn-primary">${t('copy')}</button><button onclick="exitRoom()" class="btn-danger">${t('quit')}</button></div><div class="waiting-room"><div class="loader-neon"></div><h3 style="color:#ffd966;">${t('waiting')}</h3><p style="color:#cbb8ff;">${t('shareCode')}</p></div>`;
    }
    function copyCodeAct() { navigator.clipboard.writeText(currentRoomId); toast(t('toastCopied')); }
    function exitRoom() { if(roomListener) roomListener.off(); if(currentRoomId) database.ref('rooms/'+currentRoomId).remove(); currentRoomId=null; currentPlayer=null; showMainInterface(); }

    function submitGuessNumber(guess) {
        database.ref('rooms/'+currentRoomId).once('value', snap => {
            const room = snap.val();
            if(!room || room.gameEnded) return;
            const isHost = currentPlayer === 'host';
            const myTurn = (isHost && room.turn === 'host') || (!isHost && room.turn === 'guest');
            if(!myTurn) { toast(t('toastNotTurn'), true); return; }
            const oppSecret = isHost ? room.guest.secretNumber : room.host.secretNumber;
            const maxR = room.range || 100;
            if(guess<1 || guess>maxR) { toast(`⚠️ ${lang==='fr'?'Entre 1 et':'بين ١ و'} ${maxR}`, true); return; }
            let result = "", isCorrect = false;
            if(guess === oppSecret) { isCorrect = true; result = t('perfectHit', {num: oppSecret}); }
            else if(guess > oppSecret) result = t('tooHigh', {guess});
            else result = t('tooLow', {guess});
            const guessMsg = { from: currentPlayer, text: `${lang==='fr'?'🔮 Mon nombre :':'🔮 تخميني :'} ${guess}`, timestamp: Date.now() };
            const resultMsg = { from: 'system', text: result, timestamp: Date.now() };
            const updates = { messages: [...(room.messages || []), guessMsg, resultMsg], currentGuess: guess };
            if(isCorrect) {
                updates.winner = currentPlayer; updates.gameEnded = true; updates.phase = 'finished';
                const winMsg = { from: 'system', text: t('winSystem', { player: isHost ? (lang==='fr'?'HÔTE':'المضيف') : (lang==='fr'?'INVITÉ':'الضيف'), num: oppSecret }), timestamp: Date.now() };
                updates.messages = [...updates.messages, winMsg];
                toast(t('toastVictory', {num: oppSecret}));
            } else { updates.turn = isHost ? 'guest' : 'host'; }
            database.ref('rooms/'+currentRoomId).update(updates);
        });
    }
    function newRoundNeo() {
        database.ref('rooms/'+currentRoomId).once('value', snap => {
            const room = snap.val(); if(!room) return;
            const curRange = room.range || 100;
            const newHost = getRandomNum(curRange), newGuest = getRandomNum(curRange);
            database.ref('rooms/'+currentRoomId).update({ 'host/secretNumber': newHost, 'guest/secretNumber': newGuest, turn: 'host', phase: 'playing', gameEnded: false, winner: null, messages: [], currentGuess: null });
            toast(t('newRoundMsg', {range: curRange}));
        });
    }

    function renderGameUI(room) {
        const isHost = currentPlayer === 'host';
        const mySecret = isHost ? room.host.secretNumber : room.guest.secretNumber;
        const oppSecret = isHost ? room.guest.secretNumber : room.host.secretNumber;
        const myTurnActive = (isHost && room.turn === 'host') || (!isHost && room.turn === 'guest');
        const canPlay = room.phase === 'playing' && myTurnActive && !room.gameEnded;
        const rangeVal = room.range || 100;
        let html = `<div class="room-header"><div class="room-code-glow">${currentRoomId}</div><button onclick="copyCodeAct()" class="btn-primary">${t('copy')}</button><button onclick="exitRoom()" class="btn-danger">${t('quit')}</button></div>`;
        html += `<div style="text-align:center; margin-bottom:8px;"><span style="background:#0a0520; padding:4px 16px; border-radius:40px; color:#ffd966;">✨ ${t('rangeLabel')} : 1 → ${rangeVal} ✨</span></div>`;
        html += `<div class="arena"><div class="fighter-card ${room.turn === 'host' && !room.gameEnded ? 'active-turn' : ''} ${room.winner === 'host' ? 'winner-card' : ''}"><div class="player-title">${isHost ? t('youHost') : t('host')}</div><div class="secret-badge">${t('secretCode')} ${isHost ? mySecret : '???'}</div>${room.turn === 'host' && !room.gameEnded ? `<div class="turn-indicator">✨ ${t('yourTurn')} ✨</div>` : ''}</div>`;
        html += `<div class="fighter-card ${room.turn === 'guest' && !room.gameEnded ? 'active-turn' : ''} ${room.winner === 'guest' ? 'winner-card' : ''}"><div class="player-title">${!isHost ? t('youGuest') : t('guest')}</div><div class="secret-badge">${t('secretCode')} ${!isHost ? mySecret : '???'}</div>${room.turn === 'guest' && !room.gameEnded ? `<div class="turn-indicator">✨ ${t('yourTurn')} ✨</div>` : ''}</div></div>`;
        html += `<div class="chat-log" id="chatArea">${(room.messages || []).map(m => `<div class="message-bubble ${m.from === currentPlayer ? 'my-bubble' : (m.from === 'system' ? 'system-bubble' : 'opponent-bubble')}">${m.from === 'system' ? '📜 ' : (m.from === 'host' ? (lang==='fr'?'⚜️ Hôte : ':'⚜️ المضيف : ') : (lang==='fr'?'🌀 Invité : ':'🌀 الضيف : '))}${m.text}</div>`).join('') || '<div style="text-align:center; opacity:0.7;">✨ Lancez la divination... ✨</div>'}</div>`;
        if(room.phase === 'waiting') html += `<div class="waiting-room"><div class="loader-neon"></div><h3>${t('waiting')}</h3></div>`;
        else if(room.phase === 'playing' && !room.gameEnded) {
            if(canPlay) html += `<div class="guess-area"><input type="number" id="neoGuess" placeholder="${t('guessPlaceholder', {max: rangeVal})}" min="1" max="${rangeVal}"/><button onclick="submitNeoGuess()" class="btn-primary" style="background:linear-gradient(105deg,#d4af37,#b8860b); color:#1a0b2e;">${t('shoot')}</button></div>`;
            else html += `<div class="waiting-room"><div class="loader-neon"></div><h3>🌀 ${t('waitingTurn')}</h3></div>`;
        } else if(room.phase === 'finished') {
            const pun = getRandomPunishment();
            html += `<div class="waiting-room"><h2 style="color:#ffd966;">${room.winner === currentPlayer ? t('victory') : t('defeat')}</h2><div class="secret-badge" style="background:#0a0520;">🔮 ${t('secretCode')} ${oppSecret} 🔮</div><div style="display:flex; gap:15px; justify-content:center; margin-top:20px;"><button onclick="showPunishmentModal('${pun}', ${room.winner === currentPlayer})" class="btn-warning">${room.winner === currentPlayer ? t('punishment') : t('suffer')}</button><button onclick="newRoundNeo()" class="btn-primary">${t('rematch')}</button></div></div>`;
        }
        document.getElementById('mainContent').innerHTML = html;
        setTimeout(() => { const chatDiv = document.getElementById('chatArea'); if(chatDiv) chatDiv.scrollTop = chatDiv.scrollHeight; }, 80);
    }
    window.submitNeoGuess = () => { const val = parseInt(document.getElementById('neoGuess')?.value); if(!isNaN(val)) submitGuessNumber(val); else toast(t('toastInvalid'), true); if(document.getElementById('neoGuess')) document.getElementById('neoGuess').value=''; };
    window.newRoundNeo = newRoundNeo;

    function showMainInterface() {
        document.getElementById('mainContent').innerHTML = `
            <div class="range-panel">
                <button class="range-option ${selectedRange === 100 ? 'active' : ''}" onclick="setNeoRange(100)">${t('btn100')}</button>
                <button class="range-option ${selectedRange === 200 ? 'active' : ''}" onclick="setNeoRange(200)">${t('btn200')}</button>
                <button class="range-option ${selectedRange === 300 ? 'active' : ''}" onclick="setNeoRange(300)">${t('btn300')}</button>
            </div>
            <div class="menu-buttons">
                <button onclick="createRoom()" class="big-btn btn-primary">${t('createRoom')}</button>
                <button onclick="joinRoom()" class="big-btn" style="background:linear-gradient(105deg,#ff66cc,#aa44aa);">${t('joinRoom')}</button>
            </div>
            <div style="background:linear-gradient(145deg,#1a0f30,#0f0720); border-radius:36px; padding:22px; text-align:center; border:1px solid rgba(212,175,55,0.3);">
                <h3 style="color:#ffd966;">${t('rulesTitle')}</h3>
                <p style="color:#e9c9ff;">${t('rule1')}</p><p style="color:#e9c9ff;">${t('rule2')}</p><p style="color:#e9c9ff;">${t('rule3')}</p><p style="color:#e9c9ff;">${t('rule4')}</p>
            </div>
        `;
    }
    function setNeoRange(val) { selectedRange = val; toast(t('toastRange', {val})); showMainInterface(); }
    window.setNeoRange = setNeoRange;
    window.createRoom = createRoom; window.joinRoom = joinRoom; window.exitRoom = exitRoom; window.copyCodeAct = copyCodeAct;

    // Switch langue
    document.getElementById('btnFr').addEventListener('click', () => { lang = 'fr'; document.getElementById('btnFr').classList.add('active'); document.getElementById('btnAr').classList.remove('active'); updateUILang(); });
    document.getElementById('btnAr').addEventListener('click', () => { lang = 'ar'; document.getElementById('btnAr').classList.add('active'); document.getElementById('btnFr').classList.remove('active'); updateUILang(); });
    
    showMainInterface();
</script>
</body>
</html>
